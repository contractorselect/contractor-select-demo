<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0D3A7A" />

  <!-- Subtle dot pattern (matches auth page right column) -->
  <defs>
    <pattern id="dots" x="0" y="0" width="32" height="32" patternUnits="userSpaceOnUse">
      <circle cx="1.5" cy="1.5" r="1.5" fill="#FFFFFF" opacity="0.06" />
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#dots)" />

  <!-- Logo monogram (scaled up, centered upper portion) -->
  <g transform="translate(540, 130)">
    <!-- Hexagon -->
    <path d="M60 8 L108 33 L108 87 L60 112 L12 87 L12 33 Z" stroke="#FFFFFF" stroke-width="3.5" stroke-linejoin="round" fill="none" opacity="0.95" />
    <!-- Buildings -->
    <g fill="#FFFFFF">
      <rect x="38" y="27" width="11" height="42" />
      <rect x="51" y="35" width="9" height="34" />
      <path d="M62 42 L73 42 L73 35 L78 35 L78 69 L62 69 Z" />
    </g>
    <!-- House -->
    <path d="M28 73 L60 53 L92 73 L92 96 L28 96 Z" fill="none" stroke="#FFFFFF" stroke-width="2.8" stroke-linejoin="round" />
    <!-- Windows -->
    <g fill="#FFFFFF" opacity="0.5">
      <rect x="54" y="78" width="5" height="5" />
      <rect x="61" y="78" width="5" height="5" />
      <rect x="54" y="85" width="5" height="5" />
      <rect x="61" y="85" width="5" height="5" />
    </g>
    <!-- Green checkmark -->
    <path d="M40 81 L52 93 L82 63" stroke="#0A8F4D" stroke-width="9" stroke-linecap="round" stroke-linejoin="round" fill="none" />
  </g>

  <!-- Wordmark -->
  <text
    x="600"
    y="370"
    text-anchor="middle"
    font-family="Poppins, system-ui, sans-serif"
    font-size="72"
    font-weight="600"
    fill="#FFFFFF"
  >ContractorSelect<tspan fill="#0A8F4D">.me</tspan></text>

  <!-- Tagline -->
  <text
    x="600"
    y="440"
    text-anchor="middle"
    font-family="Montserrat, system-ui, sans-serif"
    font-size="34"
    font-weight="500"
    fill="#FFFFFF"
    opacity="0.85"
  >Building trust. Delivering quality.</text>

  <!-- Subtitle -->
  <text
    x="600"
    y="500"
    text-anchor="middle"
    font-family="Montserrat, system-ui, sans-serif"
    font-size="22"
    font-weight="400"
    fill="#FFFFFF"
    opacity="0.6"
  >The high-trust marketplace for verified UAE contractors</text>
</svg>
