<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Hexagon background filled with primary blue -->
  <path
    d="M16 2 L28 9 L28 23 L16 30 L4 23 L4 9 Z"
    fill="#0D3A7A"
  />

  <!-- Simplified building cluster (white) -->
  <g fill="#FFFFFF">
    <rect x="11" y="8" width="3" height="11" />
    <rect x="14.5" y="10" width="2.5" height="9" />
    <rect x="17.5" y="11" width="3.5" height="8" />
  </g>

  <!-- Green checkmark — the trust accent, prominent at small sizes -->
  <path
    d="M10 22 L14 26 L23 17"
    stroke="#0A8F4D"
    stroke-width="3.5"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="none"
  />
</svg>
