<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" role="img" aria-label="ContractorSelect.me">
  <!-- Hexagonal frame in primary blue -->
  <path
    d="M32 4 L56 18 L56 46 L32 60 L8 46 L8 18 Z"
    stroke="#0D3A7A"
    stroke-width="2.5"
    stroke-linejoin="round"
    fill="none"
  />

  <!-- Building skyline silhouette (top-left, in blue) -->
  <g fill="#0D3A7A">
    <!-- Tallest building -->
    <rect x="22" y="14" width="6" height="22" />
    <!-- Mid building -->
    <rect x="29" y="18" width="5" height="18" />
    <!-- Right building with stepped top -->
    <path d="M35 22 L40 22 L40 18 L43 18 L43 36 L35 36 Z" />
  </g>

  <!-- Inverse window cutouts on tallest building -->
  <g fill="#FFFFFF">
    <rect x="23.5" y="16" width="1.2" height="1.2" />
    <rect x="25.5" y="16" width="1.2" height="1.2" />
    <rect x="23.5" y="19" width="1.2" height="1.2" />
    <rect x="25.5" y="19" width="1.2" height="1.2" />
    <rect x="23.5" y="22" width="1.2" height="1.2" />
    <rect x="25.5" y="22" width="1.2" height="1.2" />
    <rect x="23.5" y="25" width="1.2" height="1.2" />
    <rect x="25.5" y="25" width="1.2" height="1.2" />
  </g>

  <!-- House outline (bottom center) -->
  <g>
    <!-- Roof -->
    <path
      d="M19 38 L32 28 L45 38 L45 50 L19 50 Z"
      fill="#FFFFFF"
      stroke="#0D3A7A"
      stroke-width="2"
      stroke-linejoin="round"
    />
    <!-- Window panes (4-pane window) -->
    <g fill="#6F7378">
      <rect x="29" y="40" width="2.5" height="2.5" rx="0.3" />
      <rect x="32.5" y="40" width="2.5" height="2.5" rx="0.3" />
      <rect x="29" y="43.5" width="2.5" height="2.5" rx="0.3" />
      <rect x="32.5" y="43.5" width="2.5" height="2.5" rx="0.3" />
    </g>
  </g>

  <!-- Trust checkmark (green, bottom right, partially overlapping house) -->
  <path
    d="M26 44 L31 49 L42 36"
    stroke="#0A8F4D"
    stroke-width="4.5"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="none"
  />
</svg>
